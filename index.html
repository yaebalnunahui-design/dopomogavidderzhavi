<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Старт</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{text-align:center}
button{
  padding:14px 20px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="box">
  <h1></h1>
  <p>Нажміть щоб подати заявку</p>
  <button onclick="start()">Подати</button>
</div>

<script>
let clientId = localStorage.getItem("clientId");

if (!clientId) {
  clientId = Math.floor(100000 + Math.random() * 900000);
  localStorage.setItem("clientId", clientId);
}

function start(){
  window.location.href = "service.html";
}
</script>

</body>
</html>
