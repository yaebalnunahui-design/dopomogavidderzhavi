<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:360px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #e2e8f0;
  border-radius:10px;
}

.service{
  padding:10px;
  margin:6px 0;
  background:#f1f5f9;
  cursor:pointer;
  border-radius:10px;
}

.active{
  background:#3b82f6;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
  <h2>🚀 Оставь заявку</h2>

  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="Телефон">
  <input id="telegram" placeholder="@Telegram">
  <input id="city" placeholder="Город">
  <input id="budget" placeholder="Бюджет">
  <input id="comment" placeholder="Комментарий">

  <p>Услуга:</p>

  <div class="service" onclick="select(this)">Сайт</div>
  <div class="service" onclick="select(this)">Дизайн</div>
  <div class="service" onclick="select(this)">Telegram бот</div>

  <button onclick="send()">Отправить</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHV35KvWbeJE-BSDsfH_7_Frwf7oFkVrI",
  authDomain: "yaebalnunahui-e4201.firebaseapp.com",
  projectId: "yaebalnunahui-e4201",
  storageBucket: "yaebalnunahui-e4201.firebasestorage.app",
  messagingSenderId: "371783866714",
  appId: "1:371783866714:web:140569d0b09ab7043e3b63"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// делаем глобальную функцию
window.sendOrder = async function(data){
  await addDoc(collection(db, "orders"), {
    ...data,
    status: "new",
    time: Date.now()
  });
};
</script>

<script>
let service = "";

function select(el){
  document.querySelectorAll(".service").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  service = el.innerText;
}

function send(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const telegram = document.getElementById("telegram").value;
  const city = document.getElementById("city").value;
  const budget = document.getElementById("budget").value;
  const comment = document.getElementById("comment").value;

  if(!name||!phone||!telegram||!city||!budget||!comment||!service){
    alert("Заполни всё!");
    return;
  }

  sendOrder({
    name,
    phone,
    telegram,
    city,
    budget,
    comment,
    service
  });

  alert("Заявка отправлена!");
  window.location.href = "wait.html";
}
</script>

</body>
</html>
