<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  apiKey: "AIzaSyCHV35KvWbeJE-BSDsfH_7_Frwf7oFkVrI",
  authDomain: "yaebalnunahui-e4201.firebaseapp.com",
  projectId: "yaebalnunahui-e4201",
  storageBucket: "yaebalnunahui-e4201.firebasestorage.app",
  messagingSenderId: "371783866714",
  appId: "1:371783866714:web:140569d0b09ab7043e3b63"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendOrder = async function(data){
  await addDoc(collection(db, "orders"), {
    ...data,
    status: "new",
    time: Date.now()
  });
};
</script>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#eef2ff,#f8fafc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:white;
  width:380px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  text-align:center;
}

h2{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #e2e8f0;
}

.service{
  padding:10px;
  margin:6px 0;
  background:#f1f5f9;
  border-radius:10px;
  cursor:pointer;
}

.service.active{
  background:#4f46e5;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#4f46e5;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#4338ca;
}
</style>
</head>

<body>

<div class="card">
  <h2>🚀 Оставь заявку</h2>

  <!-- 6 ПОЛЕЙ -->
  <input id="name" placeholder="Имя">
  <input id="phone" placeholder="Телефон">
  <input id="telegram" placeholder="@Telegram">
  <input id="city" placeholder="Город">
  <input id="budget" placeholder="Бюджет">
  <input id="comment" placeholder="Комментарий">

  <p>Выберите услугу:</p>

  <div class="service" onclick="select(this)">Сайт</div>
  <div class="service" onclick="select(this)">Дизайн</div>
  <div class="service" onclick="select(this)">Telegram бот</div>

  <button onclick="send()">Отправить</button>
</div>

<script>
let service = "";

function select(el){
  document.querySelectorAll(".service").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  service = el.innerText;
}

function send(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const telegram = document.getElementById("telegram").value;
  const city = document.getElementById("city").value;
  const budget = document.getElementById("budget").value;
  const comment = document.getElementById("comment").value;

  if(!name||!phone||!telegram||!city||!budget||!comment||!service){
    alert("Заполни всё!");
    return;
  }

  sendOrder({
    name,
    phone,
    telegram,
    city,
    budget,
    comment,
    service
  });

  alert("Заявка отправлена!");
  window.location.href = "wait.html";
  }
